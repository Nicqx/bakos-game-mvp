apiVersion: apps/v1
kind: Deployment
metadata:
  name: bakos-game
  labels:
    app: bakos-game
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bakos-game
  template:
    metadata:
      labels:
        app: bakos-game
    spec:
      containers:
        - name: bakos-game
          image: bakos-game:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8105
          env:
            - name: PORT
              value: "8105"
            - name: BASE_PATH
              value: "/bakos"
            - name: REDIS_URL
              value: "redis://redis-service:6379"
            - name: SESSION_TIMEOUT
              value: "10800"
            - name: MIN_PLAYERS
              value: "3"
            - name: MAX_PLAYERS
              value: "20"
            # MVP-ben 1 replica van. Ha később több pod lesz, állítsd true-ra.
            - name: ENABLE_SOCKET_REDIS_ADAPTER
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bakos-game-service
  labels:
    app: bakos-game
spec:
  type: ClusterIP
  selector:
    app: bakos-game
  ports:
    - name: http
      port: 8105
      targetPort: 8105
