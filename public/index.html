<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bakos emlékverseny</title>
  <link rel="stylesheet" href="/bakos/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow" id="heroEyebrow">Kubernetes társasjáték</p>
        <h1 id="heroTitle">Bakos emlékverseny</h1>
        <p class="lead" id="heroLead">Kamu definíciók, valódi idegen szavak és sok nevetés — papírkeverés nélkül.</p>
      </div>
      <div class="top-tools">
        <label class="language-picker" for="languageSelect">
          <span id="languageLabel">Felület nyelve</span>
          <select id="languageSelect" aria-label="Felület nyelve">
            <option value="hu">Magyar</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
          </select>
        </label>
        <div class="connection-pill" id="connectionStatus">Kapcsolódás...</div>
      </div>
    </header>

    <section id="alertBox" class="alert hidden"></section>
    <section id="app"></section>
  </main>

  <script src="/bakos/socket.io/socket.io.js"></script>
  <script src="/bakos/client.js"></script>
</body>
</html>
